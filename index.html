<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Quiniela</title>

<style>

body{
    font-family:Arial;
    background:#ececec;
    margin:20px;
}

#contenedor{
    width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

#marcador{
    text-align:center;
    font-size:45px;
    font-weight:bold;
    color:#2d6a2d;
    margin-bottom:20px;
}

#info{
    text-align:center;
    margin-bottom:20px;
}

table{

    width:100%;
    border-collapse:collapse;

}

th{

    background:#5d8c31;
    color:white;
    padding:10px;

}

td{

    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;

}

.ganador{

    background:#c8ffc8;

}

#total{

    margin-top:20px;
    text-align:right;
    font-size:20px;
    font-weight:bold;

}

</style>

</head>

<body>

<div id="contenedor">

<h1 id="titulo">Cargando...</h1>

<div id="marcador">

0 - 0

</div>

<div id="info">

...

</div>

<table>

<thead>

<tr>

<th>#</th>
<th>Nombre</th>
<th>Monto</th>
<th>Local</th>
<th>Visitante</th>

</tr>

</thead>

<tbody id="tabla">

</tbody>

</table>

<div id="total">

Total:

0

</div>

</div>

<script>

const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vStBZRZ3-ipmotg7jpeuZFDBF25McNMdQh_mz2ZUuj7rMBfVp0F9WbuCRPl7U69Hg/pub?output=csv&gid=1049860530&single=true";

fetch(URL)

.then(r=>r.text())

.then(texto=>{

const filas=texto.split(/\r?\n/).map(f=>f.split(","));

const local=filas[0][1];

const visita=filas[1][1];

const golesLocal=parseInt(filas[2][1]);

const golesVisita=parseInt(filas[3][1]);

const fecha=filas[4][1];

const hora=filas[5][1];

const estado=filas[6][1];

titulo.innerHTML=local+" vs "+visita;

marcador.innerHTML=golesLocal+" - "+golesVisita;

info.innerHTML=fecha+" | "+hora+" | "+estado;

let inicio=filas.findIndex(f=>f[0]=="NOMBRE");

let total=0;

for(let i=inicio+1;i<filas.length;i++){

    if(filas[i][0]=="") continue;

    let nombre=filas[i][0];

    let monto=parseFloat(filas[i][1]);

    let apuestaLocal=parseInt(filas[i][2]);

    let apuestaVisita=parseInt(filas[i][3]);

    total+=monto;

    let clase="";

    if(apuestaLocal==golesLocal && apuestaVisita==golesVisita){

        clase="ganador";

    }

    tabla.innerHTML+=`
    <tr class="${clase}">
    <td>${i-inicio}</td>
    <td>${nombre}</td>
    <td>${monto}</td>
    <td>${apuestaLocal}</td>
    <td>${apuestaVisita}</td>
    </tr>
    `;

}

total.innerHTML="Total Apostado: Bs "+total.toFixed(2);

})

.catch(e=>{

document.body.innerHTML="<h2>Error leyendo Google Sheets</h2><pre>"+e+"</pre>";

});

</script>

</body>
</html>
