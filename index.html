<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prueba Google Sheets</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    background:#f0f0f0;
    margin-top:80px;
}

h1{
    color:#2d6a2d;
}

#equipo{
    font-size:40px;
    color:#004080;
    font-weight:bold;
    margin-top:30px;
}

</style>

</head>

<body>

<h1>Equipo Local</h1>

<div id="equipo">
Cargando...
</div>

<script>

const URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vStBZRZ3-ipmotg7jpeuZFDBF25McNMdQh_mz2ZUuj7rMBfVp0F9WbuCRPl7U69Hg/pub?output=csv&gid=1049860530&single=true";

fetch(URL)
.then(r=>{

    console.log("Estado:",r.status);

    return r.text();

})
.then(texto=>{

    console.log(texto);

    let filas = texto.split(/\r?\n/);

    let primera = filas[0].split(",");

    document.getElementById("equipo").innerHTML=primera[1];

})
.catch(error=>{

    console.log(error);

    document.getElementById("equipo").innerHTML="ERROR";

});

</script>

</body>
</html>
