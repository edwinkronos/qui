<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Quiniela</title>

<style>

body{
    font-family:Arial;
    background:#ececec;
    margin:20px;
}

#contenedor{
    width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

#marcador{

    text-align:center;
    font-size:55px;
    font-weight:bold;
    color:#2d6a2d;
    margin-bottom:20px;

}

#info{

    text-align:center;
    margin-bottom:20px;
    font-size:20px;

}

table{

    width:100%;
    border-collapse:collapse;

}

th{

    background:#5d8c31;
    color:white;
    padding:10px;

}

td{

    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;

}

.ganador{

    background:#c8ffc8;

}

#total{

    margin-top:20px;
    text-align:right;
    font-size:22px;
    font-weight:bold;

}

</style>

</head>

<body>

<div id="contenedor">

<h1 id="titulo">

Cargando...

</h1>

<div id="marcador">

0 - 0

</div>

<div id="info">

...

</div>

<table>

<thead>

<tr>

<th>#</th>

<th>Nombre</th>

<th>Monto</th>

<th id="equipoLocal">

Local

</th>

<th id="equipoVisitante">

Visitante

</th>

</tr>

</thead>

<tbody id="tabla">

</tbody>

</table>

<div id="total">

Total Apostado: Bs 0

</div>

</div>

<script>

const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vStBZRZ3-ipmotg7jpeuZFDBF25McNMdQh_mz2ZUuj7rMBfVp0F9WbuCRPl7U69Hg/pub?output=csv&gid=1049860530&single=true";

fetch(URL)

.then(r=>r.text())

.then(texto=>{

const filas=texto.split(/\r?\n/).map(f=>f.split(","));

const local=filas[0][1];

const visita=filas[1][1];

const golesLocal=Number(filas[2][1]);

const golesVisita=Number(filas[3][1]);

const fecha=filas[4][1];

const hora=filas[5][1];

const estado=filas[6][1];

titulo.innerHTML=local+" vs "+visita;

marcador.innerHTML=golesLocal+" - "+golesVisita;

info.innerHTML=fecha+" | "+hora+" | "+estado;

document.getElementById("equipoLocal").innerHTML=local;

document.getElementById("equipoVisitante").innerHTML=visita;
    
let inicio=filas.findIndex(f=>f[0]=="NOMBRE");

let totalApostado=0;

for(let i=inicio+1;i<filas.length;i++){

    if(filas[i][0].trim()=="")
        continue;

    let nombre = filas[i][0];

    let monto = Number(filas[i][1]) || 0;

    let apuestaLocal = Number(filas[i][2]);

    let apuestaVisita = Number(filas[i][3]);

    totalApostado += monto;

    let clase="";

    if(
        apuestaLocal===golesLocal &&
        apuestaVisita===golesVisita
    ){
        clase="ganador";
    }

    tabla.innerHTML += `

    <tr class="${clase}">

        <td>${i-inicio}</td>

        <td>${nombre}</td>

        <td>
            <b>Bs ${monto.toFixed(2)}</b>
        </td>

        <td>
            <b>${apuestaLocal}</b>
        </td>

        <td>
            <b>${apuestaVisita}</b>
        </td>

    </tr>

    `;

}

    document.getElementById("total").innerHTML =
"Total Apostado: <b>Bs " + totalApostado.toFixed(2) + "</b>";

})

.catch(error=>{

document.body.innerHTML=`

<h2 style="text-align:center;color:red">

Error leyendo Google Sheets

</h2>

<pre style="text-align:center">

${error}

</pre>

`;

});

</script>

</body>

</html>
